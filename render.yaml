services:
  - type: web
    name: shieldpay-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MALLOC_TRIM_THRESHOLD_
        value: 100000